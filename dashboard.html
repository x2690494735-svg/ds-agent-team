<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DS Studio · 控制台</title>
<style>
  :root {
    --bg: #0a0a0a; --surface: #141414; --border: #1f1f1f;
    --text: #c9c9c9; --dim: #666; --accent: #f5f5f7;
    --green: #30d158; --red: #ff453a; --amber: #ff9f0a; --blue: #0a84ff;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; padding:24px; min-height:100vh; }
  h1 { font-size:18px; font-weight:500; color:var(--accent); margin-bottom:4px; }
  .sub { font-size:12px; color:var(--dim); margin-bottom:20px; }
  .stats { display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
  .stat { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:12px 16px; min-width:100px; }
  .stat .n { font-size:24px; font-weight:600; }
  .stat .l { font-size:11px; color:var(--dim); margin-top:2px; }
  .stream { display:flex; flex-direction:column; gap:2px; }
  .entry { display:flex; align-items:center; gap:10px; padding:6px 10px; border-radius:4px; font-size:13px; border-left:2px solid transparent; animation:in .2s ease; }
  @keyframes in { from { opacity:0; transform:translateY(-4px); } }
  .entry.send { border-left-color:var(--green); background:rgba(48,209,88,.04); }
  .entry.recv { border-left-color:var(--blue); background:rgba(10,132,255,.04); }
  .entry .agent { font-weight:500; min-width:60px; color:var(--accent); }
  .entry .time { font-size:11px; color:var(--dim); min-width:50px; }
  .entry .msg { flex:1; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .footer { margin-top:16px; font-size:11px; color:var(--dim); }
  .badge { display:inline-block; padding:2px 6px; border-radius:3px; font-size:10px; font-weight:500; }
  .badge.send { background:rgba(48,209,88,.15); color:var(--green); }
  .badge.recv { background:rgba(10,132,255,.15); color:var(--blue); }
</style>
</head>
<body>
<h1>DS Studio</h1>
<div class="sub" id="sub">连接中...</div>
<div class="stats" id="stats"></div>
<div class="stream" id="stream"></div>
<div class="footer">自动刷新 · 3s</div>
<script>
const AGENTS = ['PM','研究员','总结','审校','转写','生图','美术总监','内容策划','分镜','配音'];
const COLORS = ['#f5f5f7','#0a84ff','#30d158','#ff9f0a','#bf5af2','#ff453a','#5e5ce6','#ff375f','#30d158','#64d2ff'];

async function refresh() {
  try {
    const r = await fetch('/api/activity');
    const d = await r.json();
    document.getElementById('sub').textContent = d.items.length + ' 条活动 · ' + new Date().toLocaleTimeString();

    let statsHTML = '';
    for (const a of AGENTS) {
      const s = d.stats[a];
      if (!s) continue;
      statsHTML += `<div class="stat"><div class="n">${s.sent + s.received}</div><div class="l">${a}</div></div>`;
    }
    document.getElementById('stats').innerHTML = statsHTML || '<div class="stat"><div class="n">--</div><div class="l">等待活动</div></div>';

    let html = '';
    for (const e of d.items.slice(0, 40)) {
      const cls = e.type === 'send' ? 'send' : 'recv';
      const badge = e.type === 'send' ? '<span class="badge send">发</span>' : '<span class="badge recv">收</span>';
      const time = new Date(e.time).toLocaleTimeString();
      html += `<div class="entry ${cls}"><span class="time">${time}</span>${badge}<span class="agent">${e.agent||''}</span><span class="msg">${(e.content||e.chars+'字'||'').replace(/</g,'&lt;')}</span></div>`;
    }
    if (!html) html = '<div class="entry"><span class="msg" style="color:var(--dim)">暂无活动。bot 启动后将显示实时消息流。</span></div>';
    document.getElementById('stream').innerHTML = html;
  } catch(e) {
    document.getElementById('sub').textContent = '等待 bot 启动...';
  }
}
refresh();
setInterval(refresh, 3000);
</script>
</body>
</html>
